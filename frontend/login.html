<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | The Guardian Ledger</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/frontend/js/script.js" defer></script>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body class="bg-surface text-on-background font-body">
    <header class="fixed top-0 left-0 w-full z-50 bg-[#f6fafe] shadow-sm">
        <nav class="flex justify-between items-center w-full px-8 py-4 max-w-7xl mx-auto">
            <span class="text-xl font-extrabold text-[#003461] tracking-tighter font-headline cursor-pointer" onclick="location.href='/'">The Guardian Ledger</span>
            <div class="flex items-center gap-4">
                <a class="font-['Manrope'] font-bold text-sm text-slate-500 hover:text-[#004b87]" href="/register">Register</a>
            </div>
        </nav>
    </header>

    <main class="pt-20">
        <section class="flex items-center justify-center px-4 py-12 bg-surface min-h-[80vh]">
            <div class="grid lg:grid-cols-2 max-w-6xl w-full gap-0 overflow-hidden bg-surface-container-lowest rounded-xl shadow-2xl border border-outline-variant/20">
                <div class="hidden lg:flex flex-col justify-between p-12 vault-gradient text-white relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-full opacity-10">
                        <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBjgDwBeh4KtTiBcZB4P2PMncQ9tJ8hCt_J7M_5g0XupsnYlp-7HCEqnK1aydFJbXXdY3B7aYA8osXAmqxEyD0uSl4yno3j15SJpC5-egTlxJ3nwBEh6sEZ35wVQI1uz_GBufaxuugRA8EefvrVOgO7OG7lNzc1vq9pWdEi5vLbtHYtBAIlOo9-vRMmmRIEXYXQuN5Hr0h_VJegzcmFQyflQejw_6KagBCaatcKKlAEGjPtm4Zpw31WDLXVoM5Q_3dVBFXGlPYMSUc"/>
                    </div>
                    <div class="relative z-10">
                        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/10 border border-white/20 backdrop-blur-md mb-8">
                            <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">verified_user</span>
                            <span class="text-xs font-bold tracking-widest uppercase font-label">Bank-Grade Encryption</span>
                        </div>
                        <h1 class="text-5xl font-extrabold font-headline leading-tight tracking-tighter mb-6">Enter the <br/>Digital Vault.</h1>
                        <p class="text-primary-fixed-dim text-lg leading-relaxed max-w-md">Experience monolithic stability and editorial precision in your financial oversight.</p>
                    </div>
                </div>
                <div class="p-8 lg:p-16 flex flex-col justify-center bg-surface-container-lowest">
                    <h2 class="text-3xl font-bold font-headline text-primary tracking-tight mb-2">Access Ledger</h2>
                    <p class="text-on-surface-variant mt-2 mb-10">Identify yourself to proceed to the dashboard.</p>
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-on-surface-variant font-label">Username</label>
                            <input class="block w-full px-4 py-4 bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" id="login-username" placeholder="Enter username" type="text"/>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-on-surface-variant font-label">Password</label>
                            <input class="block w-full px-4 py-4 bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" id="login-password" placeholder="••••••••" type="password"/>
                        </div>
                        <button class="w-full vault-gradient text-white py-4 rounded-lg font-bold font-headline text-lg shadow-lg hover:shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2" onclick="handleLogin()">
                            <span>Login to Secure Portal</span>
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </button>
                        <p class="mt-12 text-center text-on-surface-variant font-medium">
                            New to the Ledger? <a class="text-primary font-bold hover:underline ml-1" href="/register">Register for a new account</a>
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
