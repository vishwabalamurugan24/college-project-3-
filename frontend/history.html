<body class="bg-surface text-on-surface min-h-screen">
<header class="fixed top-0 left-0 right-0 z-50 bg-[#f6fafe] dark:bg-slate-950 flex justify-between items-center w-full px-8 py-4 max-w-full mx-auto">
<div class="flex items-center gap-8">
<span class="text-xl font-extrabold text-[#003461] dark:text-blue-500 tracking-tighter cursor-pointer" onclick="location.href='/'">The Guardian Ledger</span>
<nav class="hidden md:flex gap-6 items-center">
<a class="font-headline font-bold text-sm tracking-tight text-slate-500" href="/">Home</a>
<a class="font-headline font-bold text-sm tracking-tight text-slate-500" href="/dashboard">Dashboard</a>
<a class="font-headline font-bold text-sm tracking-tight text-[#003461]" href="/history">History</a>

</nav>
</div>
<div class="flex items-center gap-4">

<th class="px-8 py-5">Volume</th>
<th class="px-8 py-5">Security Classification</th>
<th class="px-8 py-5">Check Timestamp</th>
<th class="px-8 py-5 text-right">Audit Options</th>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof loadHistory === 'function') {
            loadHistory();

    });
