<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>History | The Guardian Ledger</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/frontend/js/script.js" defer></script>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body class="bg-surface text-on-background font-body">
    <header class="fixed top-0 left-0 w-full z-50 bg-[#f6fafe] shadow-sm">
        <nav class="flex justify-between items-center w-full px-8 py-4 max-w-7xl mx-auto">
            <span class="text-xl font-extrabold text-[#003461] tracking-tighter font-headline cursor-pointer" onclick="location.href='/'">The Guardian Ledger</span>
            <div class="hidden md:flex gap-6 items-center">
                <a class="font-['Manrope'] font-bold text-sm text-slate-500 hover:text-[#004b87]" href="/dashboard">Dashboard</a>
                <a class="font-['Manrope'] font-bold text-sm text-[#003461] border-b-2 border-[#003461]" href="/history">History</a>
                <a class="font-['Manrope'] font-bold text-sm text-slate-500 hover:text-[#004b87]" href="/transaction">Transfer</a>
                <a class="font-['Manrope'] font-bold text-sm text-slate-500 hover:text-[#004b87]" href="/profile">Profile</a>
            </div>
            <button class="font-['Manrope'] font-bold text-sm text-slate-500 hover:text-[#004b87]" onclick="logout()">Logout</button>
        </nav>
    </header>

    <main class="pt-24 px-8 max-w-7xl mx-auto space-y-8 pb-12">
        <div>
            <h1 class="text-4xl font-extrabold text-primary tracking-tight mb-2">History</h1>
            <p class="text-on-surface-variant font-medium">Review and audit your complete financial ledger and security logs.</p>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm border border-outline-variant/10 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-outline-variant/10 text-[10px] font-extrabold text-outline uppercase tracking-widest">
                            <th class="px-6 py-4">Date</th>
                            <th class="px-6 py-4">Transaction ID</th>
                            <th class="px-6 py-4">Recipient</th>
                            <th class="px-6 py-4 text-center">Type</th>
                            <th class="px-6 py-4">Amount</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="history-body" class="divide-y divide-outline-variant/10"></tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
