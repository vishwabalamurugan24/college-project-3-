<body class="bg-surface text-on-surface min-h-screen">
<header class="fixed top-0 left-0 right-0 z-50 bg-[#f6fafe] dark:bg-slate-950 flex justify-between items-center w-full px-8 py-4 max-w-full mx-auto">

<div class="flex gap-4 mt-4">
<span class="bg-secondary-container px-3 py-1 rounded-full text-on-secondary-container text-xs font-bold uppercase tracking-wider border border-secondary/20">Active Account</span>
<span class="bg-primary-fixed px-3 py-1 rounded-full text-on-primary-fixed-variant text-xs font-bold uppercase tracking-wider">Tier: Essential</span>
