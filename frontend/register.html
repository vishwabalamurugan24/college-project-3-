<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Register | The Guardian Ledger</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/frontend/js/script.js" defer></script>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body class="bg-surface text-on-background font-body">
    <header class="fixed top-0 left-0 w-full z-50 bg-[#f6fafe] shadow-sm">
        <nav class="flex justify-between items-center w-full px-8 py-4 max-w-7xl mx-auto">
            <span class="text-xl font-extrabold text-[#003461] tracking-tighter font-headline cursor-pointer" onclick="location.href='/'">The Guardian Ledger</span>
            <div class="flex items-center gap-4">
                <a class="font-['Manrope'] font-bold text-sm text-slate-500 hover:text-[#004b87]" href="/login">Login</a>
            </div>
        </nav>
    </header>

    <main class="pt-20">
        <section class="flex items-center justify-center px-4 py-12 bg-surface min-h-[80vh]">
            <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-0 overflow-hidden rounded-xl shadow-xl bg-surface-container-lowest">
                <div class="hidden lg:flex flex-col justify-between p-12 vault-gradient text-white relative overflow-hidden">
                    <div class="relative z-10">
                        <h1 class="text-4xl font-extrabold font-headline leading-tight tracking-tighter mb-6">Secure Your <br/>Financial Identity.</h1>
                        <p class="text-primary-fixed-dim text-lg leading-relaxed max-w-md">Institutional-grade security for your personal assets.</p>
                    </div>
                    <div class="mt-auto relative z-10">
                         <div class="flex items-center gap-4 p-4 rounded-lg bg-white/10 backdrop-blur-md">
                            <div class="h-12 w-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
                                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
                            </div>
                            <div>
                                <p class="text-sm font-bold font-headline">Advanced Protection</p>
                                <p class="text-xs opacity-70">AES-256 Bit Encryption Standard</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="p-8 md:p-12 lg:p-16 bg-surface-container-lowest flex flex-col justify-center">
                    <h2 class="text-2xl font-bold font-headline text-primary mb-2">Create Account</h2>
                    <p class="text-on-surface-variant text-sm mb-8">Fill in your details to secure your financial identity.</p>
                    <div class="space-y-5">
                        <div class="space-y-1.5">
                            <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Username</label>
                            <input class="w-full bg-surface-container-high border-none rounded-lg px-4 py-3 focus:ring-2 focus:ring-surface-tint" id="reg-username" placeholder="johndoe" type="text"/>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Password</label>
                            <input class="w-full bg-surface-container-high border-none rounded-lg px-4 py-3 focus:ring-2 focus:ring-surface-tint" id="reg-password" placeholder="••••••••" type="password"/>
                        </div>
                        <div class="flex items-start gap-3 py-2">
                            <input class="mt-1 rounded text-primary border-outline-variant" id="terms" type="checkbox"/>
                            <label class="text-xs text-on-surface-variant" for="terms">I agree to the Terms of Service and Privacy Policy.</label>
                        </div>
                        <button class="w-full vault-gradient text-white font-headline font-extrabold py-4 rounded-lg shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" onclick="handleRegister()">
                            Create Account
                            <span class="material-symbols-outlined text-sm">arrow_forward</span>
                        </button>
                    </div>
                    <div class="mt-8 text-center">
                        <p class="text-sm text-on-surface-variant">Already have an account? <a class="text-primary font-bold hover:underline ml-1" href="/login">Login</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
